name: Package Addon

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, for example 4.0.0. Leave empty to use TOC version."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

env:
  ADDON_NAME: GroupGuardLFG
  TOC_FILE: GroupGuardLFG.toc

jobs:
  package:
    name: Build and publish addon package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate addon structure
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$TOC_FILE" ]; then
            echo "::error::$TOC_FILE was not found in the repository root."
            exit 1
          fi

          if ! grep -q '^## SavedVariables: GroupGuardLFGDB' "$TOC_FILE"; then
            echo "::error::$TOC_FILE must use only GroupGuardLFGDB as SavedVariables."
            exit 1
          fi

          if grep -R "MoldDetectorDB\|LihvoDruidaDB" -n --include='*.lua' .; then
            echo "::error::Old addon databases must not be used."
            exit 1
          fi

          echo "Addon structure looks valid."

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          TAG_VERSION="${GITHUB_REF_NAME:-}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$TAG_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            VERSION="${TAG_VERSION#v}"
          else
            VERSION="$(grep -oP '^## Version:\s*\K.*' "$TOC_FILE" | head -n 1)"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Unable to resolve addon version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Update TOC version for package
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/^## Version:.*/## Version: ${VERSION}/" "$TOC_FILE"
          grep '^## Version:' "$TOC_FILE"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --output CHANGELOG.md

      - name: Show changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md
          else
            echo "CHANGELOG.md was not generated. Creating fallback changelog."
            echo "Release ${VERSION}" > CHANGELOG.md
          fi

      - name: Package and upload
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "## GroupGuardLFG package"
            echo ""
            echo "- Version: ${VERSION}"
            echo "- TOC: ${TOC_FILE}"
            echo "- SavedVariables: GroupGuardLFGDB"
            echo "- Package name: ${ADDON_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"
