name: 🐛 Bug Report
description: Report a problem with GroupGuard LFG.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please make sure you are using the latest version before submitting.

  - type: dropdown
    id: game_version
    attributes:
      label: Game version
      description: Which World of Warcraft version are you using?
      options:
        - Retail / The War Within / Midnight
        - Classic
        - Other
    validations:
      required: true

  - type: input
    id: addon_version
    attributes:
      label: Addon version
      description: Which GroupGuard LFG version are you using?
      placeholder: "4.0.0"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected area
      options:
        - LFG applications
        - LFG search results
        - Party/Raid scan
        - Party/Raid removal
        - Raid Assist
        - Frame markers
        - Notifications / sound / flash
        - Settings / language
        - Premade Groups Filter compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: "The addon marks a player but the remove button does not remove them from raid."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open Premade Groups.
        2. Create or join a raid group.
        3. Add a rule.
        4. Click the action button.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: lua_errors
    attributes:
      label: Lua errors
      description: Paste any Lua errors here.
      render: lua
      placeholder: |
        Message: Interface/AddOns/GroupGuardLFG/...
        Stack: ...

  - type: textarea
    id: debug
    attributes:
      label: Debug information
      description: Run /ggstate and /ggdebug when relevant, then paste the output here.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I tested with the latest available version.
          required: true
        - label: I tried /reload after changing settings.
          required: false
        - label: I checked whether another addon may conflict with GroupGuard LFG.
          required: false
